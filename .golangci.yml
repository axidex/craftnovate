version: "2"
run:
  concurrency: 4
  timeout: 5m
  tests: true
  build-tags:
    - e2e

issues:
  max-issues-per-linter: 0
  max-same-issues: 50

linters:
  enable:
    # correctness
    - govet
    - staticcheck
    - unused
    - errcheck
    - errorlint
    - nilerr
    - forcetypeassert
    - copyloopvar
    - durationcheck
    - reassign
    # style
    - gocritic
    - revive
    - whitespace
    - godot
    - misspell
    - dupword
    - predeclared
    - errname
    - asciicheck
    # complexity
    - gocyclo
    - nestif
    - funlen
    - dupl
    # performance
    - perfsprint
    - unconvert
    - ineffassign
    - goconst
    # security & resources
    - gosec
    - bidichk
    - bodyclose
    - noctx
    - containedctx
    - fatcontext
    # logging
    - sloglint
    - loggercheck
    # testing
    - testifylint
    - thelper
    - usetesting
    # modernization & meta
    - modernize
    - exptostd
    - intrange
    - usestdlibvars
    - nolintlint

  settings:
    dupl:
      threshold: 150
    errcheck:
      check-type-assertions: true
    funlen:
      lines: 120
      statements: 80
    goconst:
      min-len: 3
      min-occurrences: 4
    gocyclo:
      min-complexity: 15
    gosec:
      excludes:
        - G104 # unhandled errors — already covered by errcheck with our exclusions
    nolintlint:
      require-explanation: true
      require-specific: true

  exclusions:
    presets:
      - std-error-handling # fmt.Fprint*, hash writes, etc. — errors are not actionable
    rules:
      # Test handlers/fixtures intentionally ignore write errors and may be long.
      - path: _test\.go
        linters:
          - errcheck
          - bodyclose
          - dupl
          - funlen
          - gocyclo
          - goconst
          - gosec

formatters:
  enable:
    - gofmt
    - gofumpt
  settings:
    gofumpt:
      extra-rules: true
